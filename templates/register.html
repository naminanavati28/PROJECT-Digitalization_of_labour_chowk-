<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Kaam Bharat</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef3f8 0%, #4097f4 100%) no-repeat fixed;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            padding: 40px 36px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .brand {
            margin-bottom: 24px;
        }

        .brand-logo {
            height: 56px;
            width: auto;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(33, 87, 195, 0.3);
        }

        h2 {
            font-size: 30px;
            margin: 0 0 8px;
            color: #020617;
        }

        .auth-subtitle {
            font-size: 15px;
            color: #475569;
            margin-bottom: 34px;
        }

        /* FORM */
        form {
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #020617;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            outline: none;
            margin-bottom: 20px;
            background: #ffffff;
            transition: all 0.2s ease;
        }

        input:focus,
        select:focus {
            border-color: #020617;
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.35);
        }

        input[type="file"] {
            padding: 12px;
            background: #f8fafc;
        }

        button {
            width: 100%;
            margin-top: 12px;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #2157c3, #4097f4);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(33, 87, 195, 0.4);
        }

        .auth-footer {
            margin-top: 28px;
            font-size: 14px;
            color: #475569;
        }

        .auth-footer a {
            color: #2157c3;
            font-weight: 700;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .translate-wrap {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 9999;
            background: #ffffff;
            border-radius: 12px;
            padding: 10px 14px;
            box-shadow: 0 6px 24px rgba(2, 6, 23, 0.15);
            animation: translateFadeIn 0.5s ease-out;
        }

        .translate-wrap:hover {
            box-shadow: 0 8px 28px rgba(33, 87, 195, 0.25);
            transform: translateY(-2px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        @keyframes translateFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .translate-wrap .goog-te-banner-frame {
            display: none !important;
        }

        .translate-wrap .goog-te-gadget {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif !important;
            font-size: 14px !important;
            font-weight: 600 !important;
            letter-spacing: 0.3px !important;
        }

        .translate-wrap .goog-te-gadget-simple {
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 8px !important;
        }

        .translate-wrap .goog-te-menu-value span {
            color: #1e293b !important;
        }
    </style>
</head>

<body>
    <div class="translate-wrap">
        <div id="google_translate_element"></div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement(
                {
                    pageLanguage: 'en',
                    includedLanguages: 'en,hi,gu,ta,te,kn,ml,mr,ur',
                    layout: google.translate.TranslateElement.InlineLayout.SIMPLE
                },
                'google_translate_element'
            );
        }
    </script>

    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
    </script>
    <div class="auth-card">

        <div class="brand">
            <a href="/"><img src="/static/logo1.jpeg" alt="Kaam Bharat" class="brand-logo"></a>
        </div>

        <h2>Create Account</h2>

        <p class="auth-subtitle">
            Register using your personal details
        </p>

        <div id="recaptcha-container"></div>
        <div id="auth-error" class="error" style="display:none; color:#dc2626; margin-bottom:12px;"></div>

        <!-- REGISTER FORM -->
        <form id="register-form" method="POST" action="/register" enctype="multipart/form-data">

            <label>Name</label>
            <input type="text" id="reg-name" name="name" required>

            <label>Phone Number</label>
            <input type="text" id="reg-phone" name="phone" required maxlength="10" pattern="[6-9][0-9]{9}"
                inputmode="numeric" placeholder="e.g. 9876543210" title="Valid 10-digit Indian mobile (starts 6,7,8,9)">

            <label>Role</label>
            <select name="role" id="reg-role" required>
                <option value="">Select</option>
                <option value="worker">Worker</option>
                <option value="manager">Manager</option>
            </select>

            <label>Aadhaar Card</label>
            <input type="file" id="reg-aadhaar" name="aadhaar" accept="image/jpeg,image/jpg" required>
            <small class="muted">Accepted formats: JPG, JPEG</small>

            <div id="otp-section" style="display:none;">
                <label>Enter OTP</label>
                <input type="text" id="reg-otp" placeholder="••••" maxlength="6" inputmode="numeric" pattern="[0-9]+">
            </div>

            <button type="submit" id="reg-btn">
                Continue & Send OTP
            </button>
        </form>

        <div class="auth-footer">
            Already registered?
            <a href="/login">Login</a>
            {% if use_firebase %}
            <br><a href="/register?legacy=1" style="font-size:13px; color:#64748b;">Having trouble? Use phone
                verification</a>
            {% endif %}
        </div>

    </div>

    {% if use_firebase %}
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="/static/js/firebase-auth.js"></script>
    <script>
        (function () {
            var form = document.getElementById('register-form');
            var nameInput = document.getElementById('reg-name');
            var phoneInput = document.getElementById('reg-phone');
            var roleInput = document.getElementById('reg-role');
            var aadhaarInput = document.getElementById('reg-aadhaar');
            var otpSection = document.getElementById('otp-section');
            var otpInput = document.getElementById('reg-otp');
            var regBtn = document.getElementById('reg-btn');
            var errorEl = document.getElementById('auth-error');
            var aadhaarUrl = null;

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.style.display = 'block';
            }
            function hideError() {
                errorEl.textContent = '';
                errorEl.style.display = 'none';
            }

            fetch('/api/firebase-config', { credentials: 'same-origin' })
                .then(function (r) { return r.json(); })
                .then(function (res) {
                    if (!res.ok || !res.config) {
                        showError('Firebase not ready. Use legacy registration.');
                        var a = document.createElement('a');
                        a.href = '/register?legacy=1';
                        a.textContent = 'Click here';
                        a.style.color = '#2157c3';
                        errorEl.appendChild(document.createTextNode(' '));
                        errorEl.appendChild(a);
                        return;
                    }
                    window.FirebaseAuthHelper.init(res.config);

                    form.addEventListener('submit', function (e) {
                        e.preventDefault();
                        hideError();

                        if (!otpSection.style.display || otpSection.style.display === 'none') {
                            var name = nameInput.value.trim();
                            var phone = phoneInput.value.trim();
                            var role = roleInput.value;
                            var file = aadhaarInput.files[0];
                            if (!name || !phone || !role) {
                                showError('Please fill all fields');
                                return;
                            }
                            if (!file) {
                                showError('Please select Aadhaar image');
                                return;
                            }

                            regBtn.disabled = true;
                            regBtn.textContent = 'Uploading & Sending OTP...';
                            var formData = new FormData();
                            formData.append('aadhaar', file);
                            formData.append('phone', phone);
                            fetch('/api/upload-aadhaar', { method: 'POST', body: formData })
                                .then(function (r) { return r.json(); })
                                .then(function (uploadRes) {
                                    if (!uploadRes.ok) throw new Error(uploadRes.error || 'Upload failed');
                                    aadhaarUrl = uploadRes.url;
                                    return window.FirebaseAuthHelper.sendOTP(phone);
                                })
                                .then(function (result) {
                                    regBtn.disabled = false;
                                    if (result.success) {
                                        otpSection.style.display = 'block';
                                        nameInput.disabled = true;
                                        phoneInput.disabled = true;
                                        roleInput.disabled = true;
                                        aadhaarInput.disabled = true;
                                        regBtn.textContent = 'Verify & Register';
                                        otpInput.focus();
                                    } else {
                                        regBtn.textContent = 'Continue & Send OTP';
                                        showError(result.error || 'Failed to send OTP');
                                    }
                                })
                                .catch(function (err) {
                                    regBtn.disabled = false;
                                    regBtn.textContent = 'Continue & Send OTP';
                                    showError(err.message || 'Upload failed');
                                });
                        } else {
                            var code = otpInput.value.trim();
                            if (!code) { showError('Please enter OTP'); return; }
                            regBtn.disabled = true;
                            regBtn.textContent = 'Registering...';
                            window.FirebaseAuthHelper.verifyOTP(code).then(function (result) {
                                if (result.success) {
                                    fetch('/api/auth/register', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        credentials: 'same-origin',
                                        body: JSON.stringify({
                                            idToken: result.idToken,
                                            name: nameInput.value.trim(),
                                            phone: phoneInput.value.trim(),
                                            role: roleInput.value,
                                            aadhaar_url: aadhaarUrl
                                        })
                                    }).then(function (r) { return r.json(); })
                                        .then(function (data) {
                                            if (data.ok && data.redirect) {
                                                window.location.href = data.redirect;
                                            } else {
                                                regBtn.disabled = false;
                                                regBtn.textContent = 'Verify & Register';
                                                showError(data.error || 'Registration failed');
                                            }
                                        }).catch(function () {
                                            regBtn.disabled = false;
                                            regBtn.textContent = 'Verify & Register';
                                            showError('Registration failed');
                                        });
                                } else {
                                    regBtn.disabled = false;
                                    showError(result.error || 'Invalid OTP');
                                }
                            });
                        }
                    });
                })
                .catch(function () {
                    showError('Could not connect. Submit the form for legacy registration.');
                });
        })();
    </script>
    {% endif %}

</body>

</html>
