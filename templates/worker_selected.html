{% extends "base_app.html" %}
{% block title %}Job Selected | Kaam Bharat{% endblock %}
{% block extra_css %}
<style>
    .container {
        width: 100%;
        max-width: 520px;
        margin: auto;
        padding: 24px;
    }

    .card {
        background: rgba(255, 255, 255, 0.97);
        border-radius: 26px;
        padding: 34px 30px;
        box-shadow: 0 30px 70px rgba(2, 6, 23, 0.45);
    }

    .card h2 {
        margin: 0 0 22px;
        text-align: center;
        font-size: 24px;
        font-weight: 800;
        color: #020617;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13.5px;
        font-weight: 700;
        color: #334155;
    }

    input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
        background: #f8fafc;
        margin-bottom: 14px;
        color: #020617;
    }

    input:disabled {
        color: #020617;
        font-weight: 600;
    }

    hr {
        border: none;
        border-top: 1px dashed #e5e7eb;
        margin: 22px 0;
    }

    .action-row {
        margin-top: 22px;
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .action-row form {
        flex: 1;
        min-width: 140px;
    }

    button {
        width: 100%;
        padding: 18px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #2157c3, #2157c3);
        color: #fcfdfe;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
    }

    button.danger {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
    }
</style>
{% endblock %}
{% block content %}
<div class="container">
    <div class="card">
        <h2>You are selected</h2>
        <form>
            <label>Job Title</label>
            <input value="{{ job.title }}" disabled>
            <label>Category</label>
            <input value="{{ job.category }}" disabled>
            <label>Location</label>
            <input value="{{ job.location }}" disabled>
            <label>Wage</label>
            <input value="₹{{ job.wage }} / day" disabled>
            <label>Duration</label>
            <input value="{{ job.duration_days }} days" disabled>
            <label>Work Time</label>
            <input value="{{ job.start_time | to_ampm }} - {{ job.end_time | to_ampm }}" disabled>
            <hr>
            <label>Manager Name</label>
            <input value="{{ manager.name }}" disabled>
            <label>Manager Phone</label>
            <input value="{{ manager.phone }}" disabled>
        </form>
        <div class="action-row">
            <form action="/worker-response/{{ application.id }}/accept" method="post">
                <button type="submit">Accept Job</button>
            </form>
            <form action="/worker-response/{{ application.id }}/reject" method="post">
                <button type="submit" class="danger">Decline Job</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
